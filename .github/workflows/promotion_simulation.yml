name: CI - promotion simulation
on:
  push:
  pull_request:

jobs:
  promotion-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e . || true
      - name: Run tests
        run: pytest -q
