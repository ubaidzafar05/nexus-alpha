name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check nexus_alpha/data nexus_alpha/api tests --ignore S101,B017,SLF001

      - name: Compile
        run: python -m compileall nexus_alpha

      - name: CLI smoke
        run: python -m nexus_alpha.cli --help

      - name: Tests
        run: pytest -q tests/unit
