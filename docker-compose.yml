services:
  # ─── Core Data Infrastructure ─────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus_dev}
      POSTGRES_DB: nexus_alpha
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_alpha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexus_dev} --appendonly yes --maxmemory 900mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-nexus_dev} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka (KRaft — no Zookeeper required) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      CLUSTER_ID: "L8guorN9QMuh58127ULtPg"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── FREE LOCAL LLM SERVER — replaces Anthropic Claude + OpenAI ──────────
  # After first startup: docker compose exec ollama ollama pull qwen3:8b
  #                      docker compose exec ollama ollama pull deepseek-r1:8b
  #                      docker compose exec ollama ollama pull nomic-embed-text
  #                      docker compose exec ollama ollama pull mistral:7b
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 9G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FREE Web Intelligence Agents — replaces OpenClaw paid backend ─────────
  crawl4ai:
    image: unclecode/crawl4ai:latest
    restart: unless-stopped
    ports:
      - "11235:11235"
    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_TOKEN:-nexus_crawl4ai}
    deploy:
      resources:
        limits:
          memory: 2G

  # ─── FREE Vector Database — replaces paid vector DB ──────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── ML Infrastructure ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      timescaledb:
        condition: service_healthy
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts

  # ─── FREE Trading Engine ──────────────────────────────────────────────────
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    volumes:
      - ./freqtrade/config:/freqtrade/user_data/config
      - ./freqtrade/strategies:/freqtrade/user_data/strategies
      - freqtrade_data:/freqtrade/user_data/data
      - freqtrade_logs:/freqtrade/user_data/logs
    ports:
      - "8080:8080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FREQTRADE_JWT_SECRET: ${FREQTRADE_JWT_SECRET:-nexus_jwt_change_me}
      FREQTRADE_WS_TOKEN: ${FREQTRADE_WS_TOKEN:-nexus_ws_token}
      FREQTRADE_API_PASSWORD: ${FREQTRADE_API_PASSWORD:-nexus_api_pw}
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_dev}@redis:6379/0
    command: trade --config /freqtrade/user_data/config/config.json --strategy NexusAlphaStrategy
    depends_on:
      redis:
        condition: service_healthy

  # ─── Monitoring Stack ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  # ─── Loki — log aggregation — replaces paid log management ───────────────
  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  # ─── NEXUS-ALPHA Application ──────────────────────────────────────────────
  nexus:
    build:
      context: .
      target: production
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      TRADING_MODE: paper
      LOG_LEVEL: INFO
      TIMESCALEDB_URL: postgresql+asyncpg://nexus:${DB_PASSWORD:-nexus_dev}@timescaledb:5432/nexus_alpha
      REDIS_URL: redis://:${REDIS_PASSWORD:-nexus_dev}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Free LLM stack
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_PRIMARY_MODEL: qwen3:8b
      OLLAMA_FAST_MODEL: mistral:7b
      OLLAMA_REASONING_MODEL: deepseek-r1:8b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Alerts
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Free data source keys (all have free tiers)
      CRYPTOPANIC_API_TOKEN: ${CRYPTOPANIC_API_TOKEN:-}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      # Vector DB
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    command: paper
    healthcheck:
      test: ["CMD", "python", "-m", "nexus_alpha.cli", "health"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 3
    restart: unless-stopped

watchdog:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app:ro
    command: ["python", "infra/self_healing/watchdog.py"]
    environment:
      - ENV_FILE=.env
    depends_on:
      - timescaledb
      - redis
      - kafka
      - ollama

volumes:
  timescaledb_data:
  redis_data:
  kafka_data:
  ollama_models:
  mlflow_data:
  freqtrade_data:
  freqtrade_logs:
  grafana_data:
  prometheus_data:
  loki_data:
  qdrant_data:
